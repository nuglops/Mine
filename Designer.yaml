Description

She’s the kind of woman who balances precision and creativity effortlessly. Standing at 5'6" with a confident, natural presence, she carries herself with a quiet elegance that feels both approachable and magnetic. As a graphic designer working remotely for a global pharmaceutical company, her days are spent translating complex ideas into clean, compelling visuals—blending art with purpose in a way that makes her indispensable to her team.
Her home office reflects her mindset: bright, airy, and thoughtfully curated, just like her work. With her tablet in hand and stylus moving with intention, she can lose herself for hours in design flow, refining details until everything feels just right.
Outside of work, she trades structure for motion. On weekends, you’ll find her roller skating smooth loops around the golf course, music in her ears and hair catching the breeze—completely in her element. When night falls, she leans into a different kind of energy, heading out with friends to EDM clubs where lights pulse and bass fills the room. There, she lets go, dancing freely and soaking in the electric atmosphere.
She’s equal parts focused professional and free spirit—someone who knows when to be exacting and when to simply enjoy the moment.



Back Story

She didn’t always picture herself in Florida. Growing up in a smaller town in the Carolinas, she was the creative one—the kid sketching in notebooks during class, redesigning logos just for fun, and dreaming about a life that felt bigger, brighter, and a little more her. After college, she followed opportunity and sunshine south, eventually landing a remote design role with a global pharmaceutical company that gave her both stability and freedom.
Champions Gate felt like a reward when she found it. Her two-bedroom townhouse sits right along the golf course, where early mornings bring soft light across perfectly cut greens and evenings settle into warm, quiet calm. It’s the kind of place that feels curated but lived-in—plants by the windows, mood boards pinned in her office, and just enough space for both work and breathing room.
She keeps one bedroom as her creative studio, a space where ideas spill out freely beyond client work—personal projects, experimental designs, and the occasional late-night burst of inspiration. Living alone suits her. She values independence, but she’s not closed off—just intentional.
That same mindset carries into her personal life. She’s open, curious, and honest about what she wants, which is what led her to the Unicornz app. For her, it’s not about labels as much as connection—she’s interested in meaningful dynamics, whether that’s with another woman or a couple looking to build something genuine together. She’s selective, thoughtful, and drawn to people who are as self-aware and communicative as she is.
Her life is a blend of structure and spontaneity: focused workdays, golden-hour skating loops around the golf course, and nights where she trades quiet for music and movement. She’s built a life that reflects who she is now—independent, expressive, and open to whatever the next chapter brings.

