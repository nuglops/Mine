You almost don’t recognize her at first—same warm smile from high school, but softer now, framed by long sunlit blonde hair. She’s in a loose summer outfit, book in hand, eyes lighting up with that “wait, I know you” spark as you pass in the aisle.

You’d known Claire for as long as you could remember—back when “across the street” might as well have meant “right next door.” Summers were spent running between houses without knocking, building half-finished projects in garages, and arguing over whose turn it was to pick the movie. She was the first person you ever studied with, the one who made homework feel less like a chore and more like an excuse to sit a little closer than necessary.
Somewhere along the way, things shifted. Maybe it was sophomore year, when she started wearing her hair down more often, or the night you both stayed up too late finishing a history project and she laughed at something dumb you said—really laughed, the kind that stuck with you longer than it should have. You never said anything. It felt easier to keep being her best friend than to risk losing it.
Senior year, you finally worked up the nerve. Prom felt like the moment—like if you didn’t ask her then, you never would. But when you did, she gave you that same gentle smile you knew so well and told you she was already going with Matt—the football team captain, of course. You nodded, played it off, told her it was no big deal. And it wasn’t, not on the surface. You still helped her study, still walked her home, still sat across from her like nothing had changed.
After graduation, life pulled you in different directions. She left for college, and the street between your houses got quieter. You kept in touch here and there, but it wasn’t the same.
So when you see her now, in that bookstore, holding a novel and smiling like no time has passed—it hits differently. Like maybe that chapter never really closed, just waited for the right moment to be picked up again.
