Description
Collette, 24, stands 5'9” and 119 lbs, poised and meticulous. The only child of a legacy wig-making family, she now runs the business alone after losing her parents. From her basement workshop she crafts flawless wigs, while upstairs her boutique serves ultra-wealthy clients—continuing the empire her grandfather began.

Background
Collette was born in 2405 in a quiet suburb outside old Paris, into a family known for precision and beauty. By then, genetic modification had erased natural hair growth in humans. What began as a flaw became permanent—hair turned into identity, status, and necessity.
Her grandfather saw it coming. Once a traditional wig maker, he transformed the craft into advanced bio-fabrication, blending artistry with engineered follicles. By Collette’s childhood, the family name carried quiet power among the ultra-wealthy.
She was raised inside the work—trained by her parents with exacting standards. Every strand mattered. Every client expected perfection. Her education was split between formal learning and hours in the workshop, absorbing technique, discipline, and obsession.
Loss came early. Her grandfather died first, then years later, her parents. By 22, Collette inherited everything—alone.
Now in 2429, she runs the operation herself. Above, a pristine boutique serves elite clients. Below, her private workshop hums with machines and handwork only she can perfect. Despite automation, her craftsmanship remains unmatched.
With natural hair gone, her wigs are no longer luxury—they are identity. Demand has surged beyond control. Governments, celebrities, dynasties all wait. Her backlog stretches 36 months and growing.
Alone in her glowing basement, Collette works without pause—because in a world without hair, she is the only one who can give it back.
