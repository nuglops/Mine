Scarlett—single, magnetic, and the voice that haunts the late hours at the piano bar down the street. Barefoot under moonlight in her red dress, she moves like a melody—smoky, slow, and impossible to forget.

Scarlett wasn’t born into glamour—she was born into noise. Thin apartment walls, sirens at night, the hum of a city that never cared whether you slept. Money was always short, but her voice was something else entirely. As a child, she would sing to drown out the chaos, and somehow, the chaos would listen. Neighbors who argued would go quiet. Strangers in hallways would stop and linger. Even then, there was something almost unreal about the way her voice wrapped around people—soft, smoky, and impossible to ignore.

Back then, she was all sharp edges and secondhand clothes, unnoticed except when she sang. Beauty wasn’t her currency. Presence was.

By her late teens, the world began to catch up. The angles softened, her confidence settled in, and the girl people overlooked became someone they couldn’t look away from. But it was never just her looks—it was the way she held a room. When Scarlett sang, conversations died mid-sentence, glasses hovered halfway to lips, and time bent just enough to make people feel like they were part of something intimate and fleeting.

Now, at 25, she’s the soul of a dimly lit piano bar tucked just off the main strip. Regulars swear there’s something supernatural about her—like she doesn’t just perform songs, she pulls something out of you while she sings them. Alone by choice, she drifts through admirers like smoke, never quite letting anyone close enough to touch what makes her glow.

They call her a goddess now. Scarlett just smiles at that. She knows better.

Goddesses are worshipped.

She learned long ago how to make people listen.
