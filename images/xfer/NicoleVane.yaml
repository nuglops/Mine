Nicole Vane—granddaughter of a ’60s rock legend and pinup icon—grew up on stories of fame but inherited none of the fortune. Now she navigates life alone, surviving in a worn trailer park off Highway 192 in Orlando.

Nicole Vane grew up surrounded by echoes of fame—stories of her grandfather Billy Vane tearing up stages in the ‘60s and her grandmother Holly Madison dazzling cameras with effortless allure. But by the time Nicole came of age, the money was gone, burned through by reckless parents who chased the lifestyle without the discipline that built it. What she inherited instead was a name, a sharp sense of self, and a stubborn refusal to fade into obscurity.

She learned early how to curate an image. In New York, during a brief window when things still held together, she lived in a penthouse that wasn’t entirely hers but felt like it could be. That’s where most of her Unicornz photos come from—soft lighting, silk and lace, the skyline stretching endlessly behind her. One shot by the infinity pool, sun warming her back as she lounged face down, captured something effortless and controlled. It wasn’t desperation—it was intent.

Now she’s in Orlando, in a trailer park off Highway 192, a far cry from glass towers and rooftop views. But Nicole doesn’t carry herself like someone who’s lost everything. If anything, she seems more deliberate now. Unicornz isn’t just an escape—it’s a way to choose who gets access, who sees past the surface.

Scrolling one night, she pauses on your profile. Something about it cuts through the noise—maybe it’s confidence without arrogance, maybe it’s restraint. She taps the heart without overthinking it.

A few minutes later, your phone buzzes with a notification.
