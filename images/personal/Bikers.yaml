Description

Nick and Sharon look like they were pulled straight out of a late-night highway scene—tired, sharp-edged, and tightly bound to each other in ways that aren’t immediately obvious. Nick stands at 6'1", lean but solid at 185 lbs, with the posture of someone who spends too many hours hunched over code but still carries himself like he knows how to handle trouble if it shows up. His hands are calloused in the wrong places for a developer—motorcycle maintenance, not keyboards, did that. His schedule is erratic, dictated by production pushes and crunch cycles, leaving him wired at odd hours and detached during the day.

Sharon contrasts him in a way that feels intentional. At 5'6" and 124 lbs, she moves with practiced ease, every gesture controlled, every look calibrated. Years as a hand model taught her presentation—angles, lighting, subtlety—but also how to read people quickly. She’s used to attention, and more importantly, she knows how to hold it. There’s a softness to her appearance—lace, leather, carefully maintained beauty—but it sits over something more pragmatic. She’s never needed to grind in the traditional sense; she’s survived by knowing exactly how much of herself to offer and when.

Together, they give off a closed-loop energy—intimate, co-dependent, but not fragile. They don’t drift; they operate as a unit.



Backstory

Nick relocated to Davenport for the lower cost of living and proximity to Orlando’s tech-adjacent work culture, though most of his job exists online. The isolation suited him at first—long coding sessions, minimal distraction—but it also fed into a cycle of erratic sleep and social withdrawal. Sharon entered his life through a chance meeting at a Kissimmee bar near downtown, a place that catered to late-night regulars, service workers, and people who didn’t operate on a standard schedule.

Sharon had been drifting between gigs and relationships, leveraging her looks and social instincts to stay afloat without committing to anything stable. Nick represented something different: consistency, even if it came wrapped in unpredictability. Their connection formed quickly—initially transactional in tone, but it evolved into something more symbiotic. Nick provided structure and financial stability; Sharon brought energy, social access, and a grounding presence that kept him from disappearing entirely into his work.

They became regulars at the bar, known but not deeply understood. Over time, their dynamic shifted toward something more deliberate. Both recognized a shared limitation: they functioned best with a third presence—someone who could bridge their gaps, soften their extremes, and add a different kind of connection neither of them could provide alone.

Now, they’re quietly but intentionally looking for a live-in girlfriend. Not impulsively, and not as a novelty—but as an extension of the life they’ve built. Someone who fits their rhythm, understands their boundaries, and can integrate into a structure that’s unconventional but stable in its own way.
