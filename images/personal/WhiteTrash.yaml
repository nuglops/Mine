Description

She’s the kind of person most people pass without really seeing—small, quiet, and worn down in a way that doesn’t come from a single bad day, but from years of them stacking up. In her mid-twenties, she looks both younger and older at the same time. Her bleached blonde hair is always tied up in a messy bun, more out of habit than style, with loose strands framing a face that carries permanent traces of exhaustion. Her bright blue eyes still have a softness to them, but they’re dulled by long shifts, short nights, and the kind of worry that never really turns off.

She works at the local Dollar Tree, pulling minimum wage and stretching every dollar as far as it will go. It’s not a job she talks about much—it’s just what she does. Stocking shelves, running the register, dealing with customers who barely look at her. It pays the electric bill, keeps food in the fridge, and that’s enough. Most days, “enough” is all she aims for.

The trailer she lives in isn’t much—old, worn, and showing it. The siding is stained, the steps creak, and the inside always smells faintly of dust and something she can’t quite get rid of. Her dad bought it years ago when things were a little better. He used to fix things around it, keep it going. When he died during COVID, everything got quieter—and harder. Now it’s just her, doing what she can to keep the place from falling apart, even if it feels like it’s slowly winning.

She doesn’t complain. There’s a kind of stubborn resilience in her, a quiet determination to keep going, even when nothing changes. She gets up, goes to work, comes home, and does it all again. It’s not the life she imagined, but it’s the one she has—and for now, she’s holding it together.


Back Story

She didn’t choose the trailer park outside Davenport so much as she drifted into it. After her dad died during COVID, everything just settled around her—the old trailer, the bills, the silence. There was no backup plan, no one stepping in. Just her, trying to keep things going the best she could.

So she works. A lot. Fifty, sometimes sixty hours a week at Dollar Tree, grabbing every extra shift she can. The job is draining—stocking shelves, running the register, dealing with people who barely notice her—but it pays just enough. Enough to keep the lights on, keep food in the fridge, keep the trailer from slipping away.

By the time she gets home, she’s exhausted. Most nights, she kicks off her worn-out Keds, sinks into the couch, and turns on the TV. Reruns, reality shows, anything to fill the quiet. The flicker of the screen and the hum of the AC keep the loneliness at bay, even if only a little.

Still, the emptiness lingers. The park is quiet, neighbors keeping to themselves, and she doesn’t have anyone to call. Out of boredom more than anything, she downloads the free version of the Unicornz app. At first, it’s just something to scroll through while the TV plays in the background—profiles, pictures, glimpses into lives that feel brighter than hers.

But it slowly becomes more. Couples looking for someone like her, people talking about fun, about being wanted. It sparks a quiet hope she doesn’t quite trust—that maybe someone out there might actually see her, want her, pull her into something different.

Now it’s routine: TV on, phone in hand, scrolling, hesitating, sometimes typing a message and deleting it. She tells herself it’s just passing time. But deep down, she’s waiting—for a message, a connection, something that might finally change her life.
